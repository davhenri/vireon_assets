<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vireon Missionen - Text Page Version</title>

    <!-- Mission CSS from GitHub -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/davhenri/vireon_assets@main/text_page_version/mission.css">

    <!-- Optional: Bootstrap für besseres Layout (falls nicht schon im Moodle vorhanden) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-4">
        <h1>Vireon Missions-System</h1>
        <p class="lead">Wähle eine Mission aus dem Dropdown-Menü und starte dein Weltraum-Abenteuer!</p>

        <!-- Mission Container mit Standard-Mission m1-01 -->
        <div id="mission-container" data-default-mission="m1-01"></div>

        <!-- Mission-Loader Script lädt automatisch alle erforderlichen Komponenten -->
        <script src="https://cdn.jsdelivr.net/gh/davhenri/vireon_assets@main/text_page_version/mission-loader-menu.js"></script>
    </div>
</body>
</html>
